name: 기능 제안
description: 새로운 기능을 제안해주세요
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        기능 제안을 작성해주셔서 감사합니다.

  - type: textarea
    id: feature-description
    attributes:
      label: 어떤 기능인가요?
      description: 추가하려는 기능에 대해 간결하게 설명해주세요
      placeholder: "예: 사용자가 프로필 사진을 업로드할 수 있는 기능"
    validations:
      required: true

  - type: textarea
    id: task-details
    attributes:
      label: 작업 상세 내용
      description: 구현해야 할 작업들을 체크리스트로 작성해주세요
      placeholder: |
        - [ ] TODO 1
        - [ ] TODO 2
        - [ ] TODO 3
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고할만한 자료(선택)
      description: 디자인 mockup, 참고 사이트, 관련 문서 등을 첨부해주세요
      placeholder: |
        스크린샷을 드래그 앤 드롭하거나
        관련 링크를 붙여넣어주세요
