services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:                                                                                                                                                                                                                    
      test: ["CMD-SHELL", "pg_isready -U postgres"]                                                                                                                                                                                 
      interval: 2s                                                                                                                                                                                                                  
      timeout: 5s                                                                                                                                                                                                                   
      retries: 10    
    volumes:
      - /var/lib/postgresql/data
      # 개발중엔 볼륨 사용하지 않음
      # - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

